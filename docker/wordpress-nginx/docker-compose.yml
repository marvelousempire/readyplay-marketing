# WordPress + MariaDB + nginx reverse proxy.
# READYPLAY marketing static files are served from /readyplay/ (see README).
#
# Usage:
#   cp .env.example .env   # edit secrets
#   Populate ./readyplay-static/ from web/out/ after building with NEXT_PUBLIC_BASE_PATH=/readyplay
#   docker compose up -d
#
# Default HTTP port: 8080 → http://localhost:8080/ (WordPress), http://localhost:8080/readyplay/ (marketing)

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - wp_db:/var/lib/mysql

  wordpress:
    image: wordpress:6-php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - wp_data:/var/www/html

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./readyplay-static:/var/www/static:ro

volumes:
  wp_db:
  wp_data:
