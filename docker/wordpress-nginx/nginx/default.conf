# READYPLAY static export under /readyplay/ + WordPress on /
# Build marketing with: NEXT_PUBLIC_BASE_PATH=/readyplay npm run build
# Then copy entire web/out/ into ./readyplay-static/ (see README in this folder).

upstream wordpress {
    server wordpress:80;
}

server {
    listen 80;
    server_name localhost;

    # Marketing site (Next static export with basePath /readyplay).
    # Volume mounts ./readyplay-static at /var/www/static (contains readyplay/… from web/out).
    location /readyplay/ {
        root /var/www/static;
        try_files $uri $uri/index.html =404;
    }

    # WordPress (everything else)
    location / {
        proxy_pass http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
