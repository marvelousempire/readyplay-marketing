# Static READYPLAY marketing site → GitHub Pages at https://readyplay.app/
#
# This repo is the source of truth for the marketing site. It is deliberately
# public so GitHub Pages can serve it; the iOS/backend monorepo stays private.
#
# Custom domain is set to readyplay.app (public/CNAME), so NEXT_PUBLIC_BASE_PATH
# is empty — assets resolve from the site root, not /readyplay-marketing/.

name: READYPLAY marketing site (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: readyplay-marketing-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
